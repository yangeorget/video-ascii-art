<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: black;
        }

        #asciiArt {
            font-family: "Courier New", monospace;
            font-size: 1vw;
            line-height: 1vw;
            color: #00ff00;
            width: 128vw;
            height: 64vh;
        }

        #videoFeed {
            display: none;
        }

        #canvas {
            display: none;
        }
    </style>
    <title>Video Ascii Art</title>
</head>
<body>
<video id="videoFeed" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div id="asciiArt"></div>
<script>
    const videoFeed = document.getElementById('videoFeed');
    const canvas = document.getElementById('canvas');
    const context = canvas.getContext('2d', {willReadFrequently: true});
    const asciiArtDiv = document.getElementById('asciiArt');

    let stream;
    let intervalId;
    // const ascii = "@%#*+=-:. ";
    const ascii =".:-=+*#%@";
    const width = 128;
    const height = 64;

    async function processImage() {
        const startTime = performance.now()
        context.drawImage(videoFeed, 0, 0, width, height);
        const imageData = context.getImageData(0, 0, width, height).data;
        let asciiArt = "";
        for (let j = 0; j < height; j++) {
            for (let i = 0; i < width; i++) {
                const index = (i + j * width) * 4;
                let brightness = Math.floor(((imageData[index] + imageData[index + 1] + imageData[index + 2]) * ascii.length) / (3 * 256));
                asciiArt += ascii[brightness];
            }
            asciiArt += "<BR>";
        }
        asciiArtDiv.innerHTML = asciiArt;
        const endTime = performance.now()
        console.log(`Call took ${endTime - startTime} milliseconds`)
    }

    async function startProcessing() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            videoFeed.srcObject = stream;
            intervalId = setInterval(processImage, 500);
        } catch (err) {
            console.error("Error accessing camera:", err);
        }
    }

    // Initialize camera when the page loads
    window.addEventListener('DOMContentLoaded', startProcessing);

    // Optional: Stop stream when page is closed/navigated away to release camera
    window.addEventListener('beforeunload', () => {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
        }
        if (intervalId) {
            clearInterval(intervalId);
        }
    });
</script>
</body>
</html>
